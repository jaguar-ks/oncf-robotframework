stages:
  - lint
  - test

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"

cache:
  paths:
    - .cache/pip

.install_requirements:
  before_script:
    - python -m pip install --upgrade pip
    - python -m pip install -r requirements.txt

lint:
  image: python:3.12-alpine
  extends: .install_requirements
  stage: lint
  script:
    - robot --dryrun --outputdir Results/dryrun Tests/E2E_Booking.robot

test:
  image: ppodgorsek/robot-framework:latest
  stage: test
  before_script:
    - export HOME="$CI_PROJECT_DIR/.home"
    - mkdir -p "$HOME/.cache"
    - export XDG_CACHE_HOME="$HOME/.cache"
  script:
    - pabot --testlevelsplit --outputdir Results --xunit xunit.xml Tests/E2E_Booking.robot
  artifacts:
    when: always
    expire_in: 1 week
    reports:
      junit: Results/xunit.xml
    paths:
      - Results/