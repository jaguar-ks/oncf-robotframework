image: python:3.12-alpine

stages:
  - lint
  - test

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"

cache:
  paths:
    - .cache/pip

.install_requirements:
  before_script:
    - python -m pip install --upgrade pip
    - python -m pip install -r requirements.txt
    - apk add --no-cache chromium chromium-chromedriver

lint:
  extends: .install_requirements
  stage: lint
  script:
    - robot --dryrun --outputdir Results/dryrun Tests/E2E_Booking.robot

test:
  extends: .install_requirements
  stage: test
  script:
    - pabot --testlevelsplit --outputdir Results --xunit xunit.xml Tests/E2E_Booking.robot
  artifacts:
    when: always
    expire_in: 1 week
    reports:
      junit: Results/xunit.xml
    paths:
      - Results/